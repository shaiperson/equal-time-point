<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translated Circle Pairs</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
        background: #0d1117;
        color: #e6edf3;
        padding: 1rem;
        max-width: 52rem;
        margin: 0 auto;
        font-size: 0.8rem;
        line-height: 1.6;
      }
      h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; color: #58a6ff; }
      .subtitle { font-size: 0.7rem; color: #8b949e; margin-bottom: 1rem; }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.6rem 1rem;
        border: 1px solid #30363d;
        border-radius: 4px;
        background: #161b22;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
      }
      .control { display: flex; flex-direction: column; gap: 0.25rem; }
      .control.full { grid-column: 1 / -1; }
      .control-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.7rem;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .control-row .value { color: #e6edf3; font-variant-numeric: tabular-nums; }
      input[type=range] {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 4px;
        background: #30363d; border-radius: 2px; outline: none;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 18px; height: 18px; border-radius: 50%;
        background: #58a6ff; cursor: pointer;
        border: 2px solid #0d1117;
      }
      input[type=range]::-moz-range-thumb {
        width: 18px; height: 18px; border-radius: 50%;
        background: #58a6ff; cursor: pointer;
        border: 2px solid #0d1117;
      }
      input[type=number] {
        font-family: inherit; font-size: 0.85rem;
        background: #0d1117; color: #e6edf3;
        border: 1px solid #30363d; border-radius: 4px;
        padding: 0.4rem 0.5rem; width: 100%;
      }
      input[type=number]:focus { outline: none; border-color: #58a6ff; }
      .buttons { grid-column: 1 / -1; display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .buttons button {
        font-family: inherit; font-size: 0.8rem;
        background: #21262d; color: #e6edf3;
        border: 1px solid #30363d; border-radius: 4px;
        padding: 0.5rem 1rem; cursor: pointer;
      }
      #add-btn { background: #1f6feb; border-color: #1f6feb; color: #fff; }
      #add-btn:hover { background: #388bfd; border-color: #388bfd; }
      #reset-btn:hover { background: #30363d; border-color: #f85149; color: #f85149; }
      .panel {
        border: 1px solid #30363d; border-radius: 4px;
        background: #161b22; padding: 0.5rem;
      }
      svg { width: 100%; height: auto; display: block; touch-action: none; }
      .anchor { cursor: grab; }
      .anchor:active { cursor: grabbing; }
      .anchor-label {
        font-family: inherit; font-size: 14px;
        fill: #f0883e; font-weight: 600;
        pointer-events: none;
        user-select: none;
      }
      .meta {
        font-size: 0.7rem; color: #8b949e; margin-top: 0.5rem;
        display: flex; gap: 1rem; flex-wrap: wrap;
      }
      .meta span { color: #e6edf3; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <h1>Translated Circle Pairs</h1>
    <div class="subtitle">Drag points A and B. Set the translation direction. "Add pair" creates two equal-radius circles centered at A and B translated by the chosen displacement along the direction. Stack as many pairs as you want.</div>

    <div class="controls">
      <div class="control full">
        <div class="control-row"><span>Direction θ</span><span class="value" id="theta-val">0°</span></div>
        <input type="range" id="theta" min="0" max="360" step="1" value="0" />
      </div>
      <div class="control">
        <div class="control-row"><span>Displacement</span></div>
        <input type="number" id="disp" value="60" step="1" />
      </div>
      <div class="control">
        <div class="control-row"><span>Radius</span></div>
        <input type="number" id="radius" value="40" step="1" min="1" />
      </div>
      <div class="control" style="justify-content: flex-end">
        <div class="control-row"><span>Pairs</span><span class="value" id="count">0</span></div>
      </div>
      <div class="buttons">
        <button id="add-btn">Add pair</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>

    <div class="panel">
      <svg id="stage" viewBox="-300 -300 600 600" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="#f0883e" />
          </marker>
        </defs>
        <line x1="-300" y1="0" x2="300" y2="0" stroke="#21262d" stroke-width="0.5" />
        <line x1="0" y1="-300" x2="0" y2="300" stroke="#21262d" stroke-width="0.5" />
        <g id="pairs-layer"></g>
        <line id="dir-arrow" x1="0" y1="0" x2="0" y2="0" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7" />
        <circle id="point-a" class="anchor" r="8" fill="#f0883e" stroke="#0d1117" stroke-width="2" />
        <circle id="point-b" class="anchor" r="8" fill="#f0883e" stroke="#0d1117" stroke-width="2" />
        <text id="label-a" class="anchor-label">A</text>
        <text id="label-b" class="anchor-label">B</text>
      </svg>
    </div>

    <div class="meta">
      <div>A: (<span id="meta-a">—</span>)</div>
      <div>B: (<span id="meta-b">—</span>)</div>
    </div>

    <script>
      (function () {
        var SVG_NS = "<http://www.w3.org/2000/svg>";
        var stage = document.getElementById("stage");
        var pairsLayer = document.getElementById("pairs-layer");
        var dirArrow = document.getElementById("dir-arrow");
        var pointAEl = document.getElementById("point-a");
        var pointBEl = document.getElementById("point-b");
        var labelAEl = document.getElementById("label-a");
        var labelBEl = document.getElementById("label-b");
        var thetaInput = document.getElementById("theta");
        var thetaVal = document.getElementById("theta-val");
        var dispInput = document.getElementById("disp");
        var radiusInput = document.getElementById("radius");
        var addBtn = document.getElementById("add-btn");
        var resetBtn = document.getElementById("reset-btn");
        var countEl = document.getElementById("count");
        var metaAEl = document.getElementById("meta-a");
        var metaBEl = document.getElementById("meta-b");

        var pointA = { x: -80, y: 0 };
        var pointB = { x: 80, y: 0 };
        var pairs = [];
        var palette = ["#58a6ff", "#3fb950", "#d29922", "#bc8cff", "#f778ba", "#39c5cf"];

        function direction() {
          var t = (+thetaInput.value) * Math.PI / 180;
          return { x: Math.cos(t), y: -Math.sin(t) };
        }

        function svgPoint(evt) {
          var pt = stage.createSVGPoint();
          pt.x = evt.clientX;
          pt.y = evt.clientY;
          var ctm = stage.getScreenCTM();
          if (!ctm) return { x: 0, y: 0 };
          return pt.matrixTransform(ctm.inverse());
        }

        function setupDrag(el, point) {
          el.addEventListener("pointerdown", function (e) {
            e.preventDefault();
            el.setPointerCapture(e.pointerId);
            var start = svgPoint(e);
            var origin = { x: point.x, y: point.y };
            function move(ev) {
              var p = svgPoint(ev);
              point.x = origin.x + (p.x - start.x);
              point.y = origin.y + (p.y - start.y);
              render();
            }
            function end() {
              el.releasePointerCapture(e.pointerId);
              el.removeEventListener("pointermove", move);
              el.removeEventListener("pointerup", end);
              el.removeEventListener("pointercancel", end);
            }
            el.addEventListener("pointermove", move);
            el.addEventListener("pointerup", end);
            el.addEventListener("pointercancel", end);
          });
        }

        function makeEl(tag, attrs) {
          var el = document.createElementNS(SVG_NS, tag);
          for (var k in attrs) el.setAttribute(k, attrs[k]);
          return el;
        }

        function render() {
          var d = direction();
          var arrowLen = 90;

          dirArrow.setAttribute("x2", (d.x * arrowLen).toFixed(2));
          dirArrow.setAttribute("y2", (d.y * arrowLen).toFixed(2));

          pointAEl.setAttribute("cx", pointA.x.toFixed(2));
          pointAEl.setAttribute("cy", pointA.y.toFixed(2));
          pointBEl.setAttribute("cx", pointB.x.toFixed(2));
          pointBEl.setAttribute("cy", pointB.y.toFixed(2));
          labelAEl.setAttribute("x", (pointA.x + 12).toFixed(2));
          labelAEl.setAttribute("y", (pointA.y - 10).toFixed(2));
          labelBEl.setAttribute("x", (pointB.x + 12).toFixed(2));
          labelBEl.setAttribute("y", (pointB.y - 10).toFixed(2));

          while (pairsLayer.firstChild) pairsLayer.removeChild(pairsLayer.firstChild);

          pairs.forEach(function (pair, i) {
            var color = palette[i % palette.length];
            var cax = pointA.x + d.x * pair.disp;
            var cay = pointA.y + d.y * pair.disp;
            var cbx = pointB.x + d.x * pair.disp;
            var cby = pointB.y + d.y * pair.disp;

            pairsLayer.appendChild(makeEl("line", {
              x1: pointA.x.toFixed(2), y1: pointA.y.toFixed(2),
              x2: cax.toFixed(2), y2: cay.toFixed(2),
              stroke: color, "stroke-width": "0.8",
              "stroke-dasharray": "3 3", opacity: "0.35",
            }));
            pairsLayer.appendChild(makeEl("line", {
              x1: pointB.x.toFixed(2), y1: pointB.y.toFixed(2),
              x2: cbx.toFixed(2), y2: cby.toFixed(2),
              stroke: color, "stroke-width": "0.8",
              "stroke-dasharray": "3 3", opacity: "0.35",
            }));
            pairsLayer.appendChild(makeEl("circle", {
              cx: cax.toFixed(2), cy: cay.toFixed(2), r: pair.radius,
              fill: color, "fill-opacity": "0.06",
              stroke: color, "stroke-width": "1.3",
            }));
            pairsLayer.appendChild(makeEl("circle", {
              cx: cbx.toFixed(2), cy: cby.toFixed(2), r: pair.radius,
              fill: color, "fill-opacity": "0.06",
              stroke: color, "stroke-width": "1.3",
            }));
            pairsLayer.appendChild(makeEl("circle", {
              cx: cax.toFixed(2), cy: cay.toFixed(2), r: "2.2", fill: color,
            }));
            pairsLayer.appendChild(makeEl("circle", {
              cx: cbx.toFixed(2), cy: cby.toFixed(2), r: "2.2", fill: color,
            }));
          });

          thetaVal.textContent = thetaInput.value + "°";
          countEl.textContent = pairs.length;
          metaAEl.textContent = pointA.x.toFixed(0) + ", " + (-pointA.y).toFixed(0);
          metaBEl.textContent = pointB.x.toFixed(0) + ", " + (-pointB.y).toFixed(0);
        }

        addBtn.addEventListener("click", function () {
          var disp = parseFloat(dispInput.value);
          var radius = parseFloat(radiusInput.value);
          if (!Number.isFinite(disp) || !Number.isFinite(radius) || radius <= 0) return;
          pairs.push({ disp: disp, radius: radius });
          render();
        });

        resetBtn.addEventListener("click", function () {
          pairs = [];
          render();
        });

        thetaInput.addEventListener("input", render);
        setupDrag(pointAEl, pointA);
        setupDrag(pointBEl, pointB);

        render();
      })();
    </script>
  </body>
</html>
